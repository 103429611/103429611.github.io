<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8"> <!-- Character set -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    </head>
<body>
    <h1>Apply</h1>
    <nav> <!--Navigation-->
        <a href="about.html">About</a>
        <a href="apply.html">Apply</a>
        <a href="index.html">Index</a>
        <a href="jobs.html">Jobs</a>
    </nav>
    <br>


    <form action="https://mercury.swin.edu.au/it000000/formtest.php" method="post">
        <fieldset>
            <!--Reference number-->
        <legend>Enter Job Reference Number:</legend>
            <input type="text" id="reference" name="reference" placeholder="Job Reference Number:" 
            pattern="^[a-zA-Z1-9]{1,20}$" required><br>
        </fieldset>

        <fieldset>
            <!--Personal details-->
        <legend>Please enter your personal details:<legend>
            <label for="firstname">First Name:</label><br>                          
            <input type="text" id="firstname" name="firstname" placeholder="First Name:"
            pattern="^[a-zA-Z]{1,20}$" required><br> <!-- NEED TO ADD FILTERS FOR ACCENTED CHARACTERS, Max 20 alphanumerical characters -->

            <label for="lastname">Last Name:</label><br>
            <input type="text" id="lastname" name="lastname" placeholder="Last Name:" 
            pattern="^[a-zA-Z]{1,20}$" required><br><!-- NEED TO ADD FILTERS FOR ACCENTED CHARACTERS, Max 20 alphanumerical characters -->

            <label for="dob">Date Of Birth:</label><br>
            <input type="text" id="dob" name="dob" placeholder="dd/mm/yyyy"
            pattern="^(0?[1-9]|[12][0-9]|3[01])[\/](0?[1-9]|1[012])[\/]\d{4}$" required>

            <fieldset>
                <!--Gender radio fieldset-->
            <legend>Gender:</legend>

                <input type="radio" name="gender" value="female" id="female" required>
                        <label for="female">Female</label><br>

                <input type="radio" name="gender" value="male" id="male">
                        <label for="male">Male</label><br>

                <input type="radio" name="gender" value="non-binary" id="non-binary">
                        <label for="non-binary">Non-Binary</label><br>

                <input type="radio" name="gender" value="null" id="null">
                <label for="null">Prefer not to say</label><br>
                <!-- Custom Gender field, probably needs more work to post the value of the
                text box instead of posting seperately, also need to check if this is allowed -->
                <input type="radio" name="gender" value="custom" id="custom">
                <label for="custom">Other:</label><br>
                <input type="text" name="custom-gender" id="custom" placeholder="Please specify:">
            </fieldset>
        </fieldset>

        <fieldset>
        <legend>Please Enter your contact details:</legend>
            <!--Contact details-->
            <label for="address">Street Address:</label><br>
            <input type="text" id="address" name="address" placeholder="Max 40 characters" 
            pattern="^{1,40}$" required><br>  

            <label for="suburb">Suburb/Town:</label><br>
            <input type="text" id="suburb" name="suburb" placeholder="Max 40 characters" 
            pattern="^{1,40}$" required><br>  

            <label for="postcode">Postcode:</label><br>
            <input type="text" id="postcode" name="postcode" placeholder="0000" 
            pattern="^[0-9]{4}$" required><br>  
            <!--Perhaps add functionality for people applying from other countries-->
            <label for="state">State:</label>
            <br>
            <select name="state" id="state">
                <option value="VIC">Victoria</option>
                <option value="NSW">New South Wales</option>
                <option value="QLD">Queensland</option>
                <option value="NT">Nothern Territory</option>
                <option value="WA">Western Australia</option>
                <option value="SA">South Australia</option>
                <option value="TAS">Tasmania</option>
                <option value="ACT">Australian Capital Territory</option>
            </select>
            <br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="example@example.com" 
            required><br>  
            <!-- add functionaility for international phone numbers? -->
            <label for="phone">Phone number:</label><br>
            <input type="text" id="phone" name="phone" placeholder="8-12 digits" 
            pattern="^[0-9]{8,12}$" required><br>  

        </fieldset>

        <fieldset>
        <legend>Coding Skills:</legend>

            <input type="checkbox" name="skills" value="HTML" id="html">
            <label for="html">HTML</label><br>

            <input type="checkbox" name="skills" value="CSS" id="css">
            <label for="css">CSS</label><br>

            <input type="checkbox" name="skills" value="JavaScript" id="javascript">
            <label for="javascript">JavaScript</label><br>

            <input type="checkbox" name="skills" value="Python" id="python">
            <label for="python">Python</label><br>





            <label for="other-skills">Other Skills:</label>
            <br>
            <textarea name="other-skills" id="other-skills" cols="40" rows="5"
            placeholder="Enter other applicable skills here"></textarea>
            <br>

  

    </fieldset>



        <input type="submit" value="Book">
        <input type="reset" value="Reset form">    


    </form>
</body>
</html>
